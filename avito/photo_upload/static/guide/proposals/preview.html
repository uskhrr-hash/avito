<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>SVG контуры — согласование</title>
  <style>
    body { margin: 0; font-family: system-ui, sans-serif; background: #111; color: #eee; }
    h1 { text-align: center; font-size: 1.1rem; padding: 12px; }
    .grid { display: flex; flex-wrap: wrap; gap: 16px; justify-content: center; padding: 12px; }
    .card { background: #1a1a1a; border-radius: 12px; padding: 8px; width: 220px; }
    .card h2 { font-size: 0.95rem; margin: 8px 4px; text-align: center; }
    .frame { background: #121212; border-radius: 8px; aspect-ratio: 9/16; }
    svg { width: 100%; height: 100%; display: block; }
    p { font-size: 0.8rem; color: #aaa; text-align: center; margin: 6px 4px 10px; }
  </style>
</head>
<body>
  <h1>Фото 1 — стопка (3 лежат + 1 стоит)</h1>
  <div class="grid">
    <div class="card">
      <h2>Вариант A</h2>
      <div class="frame">
        <svg viewBox="0 0 100 160" xmlns="http://www.w3.org/2000/svg">
          <rect width="100" height="160" fill="#121212"/>
          <text x="50" y="12" text-anchor="middle" fill="#fff" font-size="5" font-weight="700">3 лежат + 1 стоит</text>
          <ellipse cx="50" cy="138" rx="34" ry="5.5" fill="none" stroke="#93c5fd" stroke-width="0.7"/>
          <ellipse cx="50" cy="132" rx="33" ry="5" fill="none" stroke="#93c5fd" stroke-width="0.7"/>
          <ellipse cx="50" cy="126" rx="32" ry="4.8" fill="none" stroke="#93c5fd" stroke-width="0.7"/>
          <path d="M16 126 Q16 142 50 142 Q84 142 84 126" fill="none" stroke="#60a5fa" stroke-width="0.55" stroke-dasharray="2 1.5"/>
          <ellipse cx="50" cy="48" rx="28" ry="8.5" fill="none" stroke="#2563eb" stroke-width="0.9"/>
          <path d="M22 48 Q22 108 50 110 Q78 108 78 48" fill="none" stroke="#2563eb" stroke-width="0.9"/>
          <ellipse cx="50" cy="108" rx="28" ry="7.5" fill="none" stroke="#2563eb" stroke-width="0.9"/>
          <rect x="20" y="38" width="60" height="78" rx="3" fill="none" stroke="#fff" stroke-width="0.45" stroke-dasharray="2.5 2" opacity="0.85"/>
        </svg>
      </div>
      <p>Ближе к реальному кадру</p>
    </div>
    <div class="card">
      <h2>Вариант B</h2>
      <div class="frame">
        <svg viewBox="0 0 100 160" xmlns="http://www.w3.org/2000/svg">
          <rect width="100" height="160" fill="#121212"/>
          <text x="50" y="12" text-anchor="middle" fill="#fff" font-size="5" font-weight="700">упрощённый</text>
          <rect x="14" y="118" width="72" height="28" rx="5" fill="none" stroke="#60a5fa" stroke-width="0.9"/>
          <line x1="22" y1="127" x2="78" y2="127" stroke="#60a5fa" stroke-width="0.5"/>
          <line x1="22" y1="136" x2="78" y2="136" stroke="#60a5fa" stroke-width="0.5"/>
          <ellipse cx="50" cy="78" rx="26" ry="38" fill="none" stroke="#2563eb" stroke-width="1"/>
          <ellipse cx="50" cy="78" rx="16" ry="22" fill="none" stroke="#22c55e" stroke-width="0.55"/>
        </svg>
      </div>
      <p>Проще для продавца</p>
    </div>
    <div class="card">
      <h2>Вариант C</h2>
      <div class="frame">
        <svg viewBox="0 0 100 160" xmlns="http://www.w3.org/2000/svg">
          <rect width="100" height="160" fill="#121212"/>
          <text x="50" y="12" text-anchor="middle" fill="#fff" font-size="5" font-weight="700">уголки</text>
          <path d="M28 42 H18 V52" fill="none" stroke="#fff" stroke-width="1.2" stroke-linecap="round"/>
          <path d="M72 42 H82 V52" fill="none" stroke="#fff" stroke-width="1.2" stroke-linecap="round"/>
          <path d="M28 108 H18 V98" fill="none" stroke="#fff" stroke-width="1.2" stroke-linecap="round"/>
          <path d="M72 108 H82 V98" fill="none" stroke="#fff" stroke-width="1.2" stroke-linecap="round"/>
          <path d="M22 128 H14 V136" fill="none" stroke="#93c5fd" stroke-width="0.9" stroke-linecap="round"/>
          <path d="M78 128 H86 V136" fill="none" stroke="#93c5fd" stroke-width="0.9" stroke-linecap="round"/>
          <ellipse cx="50" cy="52" rx="22" ry="7" fill="none" stroke="#2563eb" stroke-width="0.8"/>
          <rect x="28" y="58" width="44" height="48" rx="10" fill="none" stroke="#2563eb" stroke-width="0.8"/>
          <ellipse cx="50" cy="132" rx="30" ry="5" fill="none" stroke="#93c5fd" stroke-width="0.7"/>
        </svg>
      </div>
      <p>Минимум линий</p>
    </div>
  </div>
</body>
</html>
