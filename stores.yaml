# Префикс в stores.yaml → имя папки на Диске (Авито/md/, Авито/sc/, …)
#
# Как менеджер загружает фото (Яндекс.Диск, папка Авито/входящие):
#   1) в подпапку магазина:  входящие/md/124889.jpg  →  Авито/md/124889.jpg
#      (имя файла — только артикул; магазин — по папке md)
#   2) legacy с префиксом в имени:  md124889.jpg в папке md — тоже находится
#   3) без папки:  входящие/124889.jpg  →  магазин неизвестен (legacy_unprefixed_store)
#
# Новый магазин: добавить блок ниже с prefix (латиница, коротко) — появится папка на Диске.
# company можно не указывать — подставится «Шинный Центр №1» из config.yaml → defaults.
#
# Уникальный Id в Excel: md_124889 (prefix + артикул)
# Один артикул, фото у нескольких магазинов — в выкладку один: у кого фото свежее.

stores:
  - prefix: md
    label: Менделеева, Владислав
    ushk_supplier: УШК Менделеева
    contact_person: Владислав
    phone: "79273181543"
    address: "Республика Башкортостан, Уфа, улица Менделеева, 21"
    email: md@shinaufa.ru

  - prefix: pg
    label: Пугачева, Антон
    ushk_supplier: УШК Пугачева
    contact_person: Антон
    phone: "79930554001"
    address: "Республика Башкортостан, Уфа, улица Пугачева, 15/1"
    email: pg@shinaufa.ru

  # - prefix: sc
  #   label: Другая точка
  #   contact_person: ...
  #   phone: "79..."
  #   address: "..."

legacy_unprefixed_store: md
