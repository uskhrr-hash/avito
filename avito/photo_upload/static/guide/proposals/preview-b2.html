<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>SVG B — стопка 72×21</title>
  <style>
    body { margin: 0; font-family: system-ui, sans-serif; background: #111; color: #eee; }
    h1 { text-align: center; font-size: 1.05rem; padding: 14px 12px 6px; }
    p { text-align: center; color: #aaa; font-size: 0.9rem; margin: 0 12px 16px; max-width: 560px; margin-left: auto; margin-right: auto; line-height: 1.45; }
    .wrap { display: flex; justify-content: center; padding: 12px; gap: 20px; flex-wrap: wrap; }
    .card { background: #1a1a1a; border-radius: 14px; padding: 10px; width: 260px; }
    .card h2 { font-size: 0.95rem; margin: 6px 4px 10px; text-align: center; }
    .frame { background: #121212; border-radius: 10px; aspect-ratio: 9/16; border: 1px solid #333; }
    svg { width: 100%; height: 100%; display: block; }
    .note { font-size: 0.82rem; color: #9ca3af; line-height: 1.45; padding: 0 8px 12px; }
  </style>
</head>
<body>
  <h1>Фото 1 — стопка 72×21</h1>
  <p>Три лежащие шины друг на друге. Сверху — та же форма вертикально (21×72).</p>
  <div class="wrap">
  <!--
    Lying module: rect 72×21, rx=5
    Stack: top y=97, middle y=118, bottom y=139
    Vertical: 21×72, bottom at y=97
  -->
    <div class="card">
      <h2>Контур</h2>
      <div class="frame">
        <svg viewBox="0 0 100 160" xmlns="http://www.w3.org/2000/svg">
          <rect width="100" height="160" fill="#121212"/>
          <text x="50" y="12" text-anchor="middle" fill="#fff" font-size="5" font-weight="700">3 лежат + 1 стоит</text>

          <g stroke="#60a5fa" fill="none">
            <rect x="14" y="97" width="72" height="21" rx="5" stroke-width="0.9"/>
            <line x1="22" y1="104" x2="78" y2="104" stroke-width="0.45"/>
            <line x1="22" y1="111" x2="78" y2="111" stroke-width="0.45"/>
            <rect x="14" y="118" width="72" height="21" rx="5" stroke-width="0.9"/>
            <line x1="22" y1="125" x2="78" y2="125" stroke-width="0.45"/>
            <line x1="22" y1="132" x2="78" y2="132" stroke-width="0.45"/>
            <rect x="14" y="139" width="72" height="21" rx="5" stroke-width="0.9"/>
            <line x1="22" y1="146" x2="78" y2="146" stroke-width="0.45"/>
            <line x1="22" y1="153" x2="78" y2="153" stroke-width="0.45"/>
          </g>

          <g stroke="#2563eb" fill="none">
            <rect x="39.5" y="25" width="21" height="72" rx="5" stroke-width="1"/>
            <line x1="46" y1="33" x2="46" y2="89" stroke-width="0.5"/>
            <line x1="54" y1="33" x2="54" y2="89" stroke-width="0.5"/>
          </g>

          <text x="50" y="18" text-anchor="middle" fill="#6b7280" font-size="3.5">лежат 72×21 · стоит 21×72</text>
        </svg>
      </div>
      <p class="note">Шины шире: 72×21 вместо 72×14. Слои по-прежнему без наложения.</p>
    </div>

    <div class="card">
      <h2>С заливкой</h2>
      <div class="frame">
        <svg viewBox="0 0 100 160" xmlns="http://www.w3.org/2000/svg">
          <rect width="100" height="160" fill="#121212"/>
          <text x="50" y="12" text-anchor="middle" fill="#fff" font-size="5" font-weight="700">3 лежат + 1 стоит</text>

          <g stroke="#60a5fa">
            <rect x="14" y="97" width="72" height="21" rx="5" fill="#60a5fa20" stroke-width="0.9"/>
            <line x1="22" y1="104" x2="78" y2="104" stroke-width="0.45"/>
            <line x1="22" y1="111" x2="78" y2="111" stroke-width="0.45"/>
            <rect x="14" y="118" width="72" height="21" rx="5" fill="#60a5fa20" stroke-width="0.9"/>
            <line x1="22" y1="125" x2="78" y2="125" stroke-width="0.45"/>
            <line x1="22" y1="132" x2="78" y2="132" stroke-width="0.45"/>
            <rect x="14" y="139" width="72" height="21" rx="5" fill="#60a5fa20" stroke-width="0.9"/>
            <line x1="22" y1="146" x2="78" y2="146" stroke-width="0.45"/>
            <line x1="22" y1="153" x2="78" y2="153" stroke-width="0.45"/>
          </g>

          <g stroke="#2563eb">
            <rect x="39.5" y="25" width="21" height="72" rx="5" fill="#2563eb20" stroke-width="1"/>
            <line x1="46" y1="33" x2="46" y2="89" stroke-width="0.5"/>
            <line x1="54" y1="33" x2="54" y2="89" stroke-width="0.5"/>
          </g>

          <text x="50" y="18" text-anchor="middle" fill="#6b7280" font-size="3.5">полупрозрачная заливка</text>
        </svg>
      </div>
      <p class="note">Тот же контур с лёгкой заливкой для камеры.</p>
    </div>
  </div>
</body>
</html>
