# nginx: avito.shinaufa.ru
# На сервере: /etc/nginx/sites-available/avito.shinaufa.ru.conf

server {
    listen 80;
    server_name avito.shinaufa.ru;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name avito.shinaufa.ru;

    root /var/www/avito-feed;

    ssl_certificate /etc/letsencrypt/live/avito.shinaufa.ru/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/avito.shinaufa.ru/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    location /feeds/ {
        alias /var/www/avito-feed/feeds/;
        add_header Cache-Control "no-cache";
    }

    location /photos/ {
        alias /opt/avito_tires_photos/;
        autoindex off;
        add_header Cache-Control "public, max-age=86400";
        types {
            image/jpeg jpg jpeg;
            image/png png;
        }
    }

    location = /photo {
        return 301 /photo/;
    }

    location /photo/ {
        proxy_pass http://127.0.0.1:8765/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        client_max_body_size 20M;
    }

    location = /health {
        return 200 "ok\n";
        add_header Content-Type text/plain;
    }

    location / {
        return 404;
    }
}
