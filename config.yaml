search_url: "https://www.avito.ru/ufa/zapchasti_i_aksessuary/shiny_diski_i_kolesa/shiny-ASgBAgICAkQKJooLgJ0B?f=ASgBAgICA0QKJooLgJ0B0LcN0oUz&localPriority=1"

max_pages: 0
page_delay_sec: 2.5
browser_profile_dir: .browser_profile
headless: true

own_seller_names:
  - "Шинный Центр №1"

compare:
  stock_file: input/goods.xlsx
  # В goods.xlsx нет строки заголовков: артикул | номенклатура | кол-во | цена
  stock_has_header: false
  stock_indexes:
    article: 0
    nomenclature: 1
    quantity: 2
    price: 3
  # Если появится файл с заголовками — stock_has_header: true и имена колонок:
  article_column: Артикул
  nomenclature_column: Номенклатура
  incoming_price_column: Цена
  quantity_column: Количество
  exclude_needs_review: true
  no_avito_multiplier: 1.15
  floor_multiplier: 1.10
  avito_discounts: [0.01, 0.02, 0.03]

autoload:
  template_file: input/432801655_2026-05-29T09_58_00Z.xlsx
  # лист с данными — второй («Шины… Легковые шины»), определяется автоматически
  image_mode: yandex_disk
  # Папка на Диске: https://disk.yandex.ru/client/disk/Авито
  yandex_disk_root: Авито
  # flat — все файлы в одной папке: 165935.jpeg, 165935-2.jpeg
  # folder — Авито/58971/1.jpeg
  photo_layout: flat
  image_count: 4
  # как на Диске: webp, jpeg, jpg, png (если буквально .web — укажите image_ext: web)
  image_ext: webp
  skip_without_photos: false
  avito_ids_file: input/avito_ids.csv
  description_html: >-
    <p><strong>Шины в наличии!</strong></p>
    <p>Новые шины {nomenclature}</p>
  defaults:
    listing_type: Package
    contact_person: Владислав
    phone: "79273181543"
    address: "Республика Башкортостан, Уфа, улица Менделеева, 21"
    contact_method: По телефону и в сообщениях
    category: Запчасти и аксессуары
    goods_type: Шины, диски и колёса
    ad_type: Товар приобретен на продажу
    product_type: Шины
    merge_ads: Да
    free_mounting: Нет
    condition: Новое
    run_flat: Нет
    audience: Частные лица и бизнес
    company: Шинный Центр
    email: md@shinaufa.ru
